name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOCKER_IMAGE: aceest-fitness-app
  PYTHON_VERSION: '3.11'

jobs:
  build-and-lint:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint

      - name: 🔍 Check Python syntax
        run: |
          echo "Checking Python syntax..."
          python -m py_compile app.py
          echo "✅ Syntax check passed!"

      - name: 🧹 Run Flake8 Linter
        run: |
          echo "Running Flake8 linter..."
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "✅ Linting passed!"

      - name: ✅ Build verification complete
        run: |
          echo "============================================"
          echo "✅ Build & Lint stage completed successfully"
          echo "============================================"

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run Pytest
        run: |
          echo "Running unit tests..."
          python -m pytest tests/ -v --tb=short
          echo "✅ All tests passed!"

  docker-build:
    name: 🐳 Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest
          echo "✅ Docker image built successfully!"

      - name: 📋 List Docker images
        run: |
          docker images | grep ${{ env.DOCKER_IMAGE }}

  container-tests:
    name: 🔬 Container Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:test .

      - name: 🚀 Start container
        run: |
          docker run -d --name test-container -p 9000:9000 ${{ env.DOCKER_IMAGE }}:test
          echo "Waiting for container to start..."
          sleep 15

      - name: ❤️ Health check
        run: |
          echo "Testing health endpoint..."
          for i in 1 2 3 4 5; do
            if curl -f http://localhost:9000/health; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "❌ Health check failed"
          docker logs test-container
          exit 1

      - name: 🔍 Test API endpoints
        run: |
          echo "Testing home endpoint..."
          curl -f http://localhost:9000/ || exit 1
          
          echo "Testing programs endpoint..."
          curl -f http://localhost:9000/api/programs || exit 1
          
          echo "Testing calorie calculation..."
          curl -f -X POST http://localhost:9000/api/calculate-calories \
            -H "Content-Type: application/json" \
            -d '{"weight": 70, "program": "Fat Loss (FL)"}' || exit 1
          
          echo "✅ All API endpoints working!"

      - name: 🧪 Verify container logs
        run: |
          echo "Container logs:"
          docker logs test-container
          echo "✅ Container verification completed!"

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

  pipeline-status:
    name: ✅ Pipeline Status
    runs-on: ubuntu-latest
    needs: [build-and-lint, unit-tests, docker-build, container-tests]
    if: always()

    steps:
      - name: 📊 Check pipeline status
        run: |
          echo "============================================"
          echo "   CI/CD PIPELINE SUMMARY"
          echo "============================================"
          echo ""
          echo "Build & Lint:      ${{ needs.build-and-lint.result }}"
          echo "Unit Tests:        ${{ needs.unit-tests.result }}"
          echo "Docker Build:      ${{ needs.docker-build.result }}"
          echo "Container Tests:   ${{ needs.container-tests.result }}"
          echo ""
          echo "============================================"
          
          if [ "${{ needs.build-and-lint.result }}" == "success" ] && \
             [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.docker-build.result }}" == "success" ] && \
             [ "${{ needs.container-tests.result }}" == "success" ]; then
            echo "✅ ALL STAGES PASSED!"
            exit 0
          else
            echo "❌ SOME STAGES FAILED!"
            exit 1
          fi

