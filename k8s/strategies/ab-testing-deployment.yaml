# ── Namespace ─────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: strategy-ab
  labels:
    strategy: ab-testing
    app: aceest-fitness-app
---
# ── ServiceAccount ────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aceest-app-sa
  namespace: strategy-ab
        image: docker.io/2024tm93553/aceest-fitness-app:v2.0.1
    app: aceest-fitness-app
---
# ── ConfigMap — Version A ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: aceest-app-config-a
  namespace: strategy-ab
  labels:
    app: aceest-fitness-app
    variant: a
data:
  FLASK_ENV: "production"
  FLASK_APP: "app.py"
  PYTHONUNBUFFERED: "1"
  DATABASE_URL: "/app/aceest_fitness.db"
  LOG_LEVEL: "INFO"
  APP_VERSION: "2.0.0"
  ENVIRONMENT: "production"
  FLASK_DEBUG: "false"
  # Feature flags — A = original behaviour
  FEATURE_NEW_DASHBOARD: "false"
  FEATURE_NEW_API: "false"
---
# ── ConfigMap — Version B ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: aceest-app-config-b
  namespace: strategy-ab
  labels:
    app: aceest-fitness-app
    variant: b
data:
  FLASK_ENV: "production"
  FLASK_APP: "app.py"
  PYTHONUNBUFFERED: "1"
  DATABASE_URL: "/app/aceest_fitness.db"
  LOG_LEVEL: "INFO"
  APP_VERSION: "2.0.1"
  ENVIRONMENT: "production"
  FLASK_DEBUG: "false"
  # Feature flags — B = new features enabled
  FEATURE_NEW_DASHBOARD: "true"
  FEATURE_NEW_API: "true"
---
# ── Version A Deployment (CONTROL — v2.0.0) ───────────────────
kind: Deployment
metadata:
  name: aceest-app-version-a
  namespace: strategy-ab
  labels:
    app: aceest-fitness-app
    variant: a
    version: v2.0.0
    ab-test: "true"
  annotations:
    deployment.strategy: "ab-testing"
    deployment.variant: "A"
    deployment.description: "Control group — original feature set v2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness-app
      variant: a
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aceest-fitness-app
        variant: a
        version: v2.0.0
        ab-test: "true"
      annotations:
        ab-variant: "A"
    spec:
      serviceAccountName: aceest-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: aceest-app
        image: docker.io/2024tm93553/aceest-fitness-app:v2.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 9000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: aceest-app-config-a
        env:
        - name: AB_TEST_VARIANT
          value: "A"
        - name: APP_VERSION
          value: "v2.0.0"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: app-data
          mountPath: /app/data
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: app-data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      terminationGracePeriodSeconds: 30
---
# ── Version B Deployment (TEST — v2.0.1) ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app-version-b
  namespace: strategy-ab
  labels:
    app: aceest-fitness-app
    variant: b
    version: v2.0.1
    ab-test: "true"
  annotations:
    deployment.strategy: "ab-testing"
    deployment.variant: "B"
    deployment.description: "Test group — new feature set v2.0.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness-app
      variant: b
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aceest-fitness-app
        variant: b
        version: v2.0.1
        ab-test: "true"
      annotations:
        ab-variant: "B"
    spec:
      serviceAccountName: aceest-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: aceest-app
        image: docker.io/2024tm93553/aceest-fitness-app:v2.0.1
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 9000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: aceest-app-config-b
        env:
        - name: AB_TEST_VARIANT
          value: "B"
        - name: APP_VERSION
          value: "v2.0.1"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: app-data
          mountPath: /app/data
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: app-data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      terminationGracePeriodSeconds: 30
---
# ── Service A — exposes Version A only ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-version-a
  namespace: strategy-ab
  labels:
    app: aceest-fitness-app
    variant: a
    strategy: ab-testing
  annotations:
    service.description: "Routes traffic to Version A (control group)"
spec:
  type: NodePort
  selector:
    app: aceest-fitness-app
    variant: a
  ports:
  - name: http
    protocol: TCP
    port: 9000
    targetPort: http
    nodePort: 30400
---
# ── Service B — exposes Version B only ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-version-b
  namespace: strategy-ab
  labels:
    app: aceest-fitness-app
    variant: b
    strategy: ab-testing
  annotations:
    service.description: "Routes traffic to Version B (test group)"
spec:
  type: NodePort
  selector:
    app: aceest-fitness-app
    variant: b
  ports:
  - name: http
    protocol: TCP
    port: 9000
    targetPort: http
    nodePort: 30401
