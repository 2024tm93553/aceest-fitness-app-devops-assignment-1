# ------- BLUE-GREEN namespace -------
apiVersion: v1
kind: Namespace
metadata:
  name: strategy-blue-green
  labels:
    strategy: blue-green
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aceest-app-config
  namespace: strategy-blue-green
data:
  FLASK_ENV: "production"
  FLASK_APP: "app.py"
  PYTHONUNBUFFERED: "1"
  DATABASE_URL: "/app/aceest_fitness.db"
  LOG_LEVEL: "INFO"
  APP_VERSION: "2.0.1"
  ENVIRONMENT: "production"
  FLASK_DEBUG: "false"
  MAX_CONTENT_LENGTH: "16777216"
  JSON_SORT_KEYS: "false"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aceest-app-sa
  namespace: strategy-blue-green
---
# Active slot service (points to blue initially)
apiVersion: v1
kind: Service
metadata:
  name: aceest-blue-green
  namespace: strategy-blue-green
  labels:
    strategy: blue-green
spec:
  type: NodePort
  selector:
    app: aceest-fitness-app
    slot: blue
  ports:
  - name: http
    protocol: TCP
    port: 9000
    targetPort: 9000
    nodePort: 30100

