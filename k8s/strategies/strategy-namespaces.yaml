# ------- SHADOW namespace -------
apiVersion: v1
kind: Namespace
metadata:
  name: strategy-shadow
  labels:
    strategy: shadow
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aceest-app-config
  namespace: strategy-shadow
data:
  FLASK_ENV: "production"
  FLASK_APP: "app.py"
  PYTHONUNBUFFERED: "1"
  DATABASE_URL: "/app/aceest_fitness.db"
  LOG_LEVEL: "INFO"
  APP_VERSION: "2.0.1"
