# ------- CANARY namespace -------
apiVersion: v1
kind: Namespace
metadata:
  name: strategy-canary
  labels:
    strategy: canary
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aceest-app-config
  namespace: strategy-canary
data:
  FLASK_ENV: "production"
  FLASK_APP: "app.py"
  PYTHONUNBUFFERED: "1"
  DATABASE_URL: "/app/aceest_fitness.db"
  LOG_LEVEL: "INFO"
  APP_VERSION: "2.0.1"
  ENVIRONMENT: "production"
  FLASK_DEBUG: "false"
  MAX_CONTENT_LENGTH: "16777216"
  JSON_SORT_KEYS: "false"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aceest-app-sa
  namespace: strategy-canary
---
# Stable service (majority traffic)
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-stable
  namespace: strategy-canary
  labels:
    strategy: canary
    release: stable
spec:
  type: NodePort
  selector:
    app: aceest-fitness-app
    version: v2.0.0
    release: stable
  ports:
  - name: http
    protocol: TCP
    port: 9000
    targetPort: 9000
    nodePort: 30200
---
# Canary service (5% traffic — new version)
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-new
  namespace: strategy-canary
  labels:
    strategy: canary
    release: canary
spec:
  type: NodePort
  selector:
    app: aceest-fitness-app
    version: v2.0.1
    release: canary
  ports:
  - name: http
    protocol: TCP
    port: 9000
    targetPort: 9000
    nodePort: 30201

