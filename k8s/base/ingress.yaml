apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-app-ingress
  namespace: prod
  labels:
    app: aceest-fitness-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - aceest-app.local
    secretName: aceest-app-tls
  rules:
  - host: aceest-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aceest-app
            port:
              number: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aceest-app-network-policy
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: aceest-fitness-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: prod
    ports:
    - protocol: TCP
      port: 9000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 9000
